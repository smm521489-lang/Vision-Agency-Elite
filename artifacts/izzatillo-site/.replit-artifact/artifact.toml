kind = "web"
previewPath = "/"
title = "Izzatillo Maripov - Personal Brand"
version = "1.0.0"
id = "artifacts/izzatillo-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20770

[services.development]
run = "pnpm --filter @workspace/izzatillo-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/izzatillo-site", "run", "build" ]
publicDir = "artifacts/izzatillo-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20770"
BASE_PATH = "/"
